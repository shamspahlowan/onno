name: onno
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^15.1.2
  flutter_svg: ^2.1.0
  get_it: ^8.0.3
  equatable: ^2.0.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/Onno_logo_android.png"
  adaptive_icon_background: "assets/onno_logo_bg_android.png"
  adaptive_icon_foreground: "assets/onno_core_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
